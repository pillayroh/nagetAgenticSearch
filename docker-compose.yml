services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      USE_MONGODB: ${USE_MONGODB:-false}
      MONGODB_URI: mongodb://mongo:27017
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_TOPIC: ${TAVILY_TOPIC:-}
      MOCK_SEARCH: ${MOCK_SEARCH:-false}
      SNIPPET_FIRST: ${SNIPPET_FIRST:-true}
      SNIPPET_FIRST_MIN_CHARS: ${SNIPPET_FIRST_MIN_CHARS:-280}
      ALWAYS_FETCH_TOP_N: ${ALWAYS_FETCH_TOP_N:-5}
      LLM_BACKEND: ${LLM_BACKEND:-huggingface}
      HF_INFERENCE_PROVIDER: ${HF_INFERENCE_PROVIDER:-featherless-ai}
      HF_TOKEN: ${HF_TOKEN:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}
      LLM_JSON_OBJECT: ${LLM_JSON_OBJECT:-true}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-15}
    depends_on:
      - mongo

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
